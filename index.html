<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Captcha Solver UI</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"><style>/* Optional custom styles if needed, but Tailwind should handle most */</style></head><body class="bg-gray-100 text-gray-900 min-h-screen flex items-center justify-center p-4"><div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center"><h1 class="text-3xl font-bold mb-6 text-green-400">Captcha Challenge</h1><div class="mb-6 flex justify-center"><img id="captcha-image" src="sample.png" alt="Default captcha image showing ADORS" class="border-2 border-green-500 rounded-md max-w-full h-auto" style="max-height: 120px;"></div><div class="mb-4"><label for="captcha-input" class="block text-gray-700 text-sm font-medium mb-2">Enter the text you see in the image:</label><input type="text" id="captcha-input" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 text-gray-800 placeholder-gray-500 text-lg" placeholder="Your answer"></div><button id="submit-button" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-md transition duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 focus:ring-offset-gray-100">Submit</button><div id="message" class="mt-4 text-lg font-semibold"></div></div><script>document.addEventListener('DOMContentLoaded', () => {const captchaImage = document.getElementById('captcha-image');const captchaInput = document.getElementById('captcha-input');const submitButton = document.getElementById('submit-button');const messageDiv = document.getElementById('message');const urlParams = new URLSearchParams(window.location.search);const imageUrl = urlParams.get('url');if (imageUrl) {captchaImage.src = imageUrl;captchaImage.alt = `Captcha image from URL: ${imageUrl}`;} else {captchaImage.src = 'sample.png';captchaImage.alt = 'Default captcha image showing ADORS';}submitButton.addEventListener('click', () => {const userAnswer = captchaInput.value.trim().toUpperCase();if (userAnswer === '') {messageDiv.textContent = 'Please enter the text you see in the image.';messageDiv.className = 'mt-4 text-lg font-semibold text-yellow-600';return;}if (imageUrl) {messageDiv.textContent = `Attempt submitted: "${userAnswer}". (Validation requires a backend)`;messageDiv.className = 'mt-4 text-lg font-semibold text-blue-600';} else {const defaultCaptchaAnswer = 'ADORS';if (userAnswer === defaultCaptchaAnswer) {messageDiv.textContent = 'Correct! Captcha solved.';messageDiv.className = 'mt-4 text-lg font-semibold text-green-600';captchaInput.value = '';} else {messageDiv.textContent = 'Incorrect. Please try again.';messageDiv.className = 'mt-4 text-lg font-semibold text-red-600';}}});captchaInput.addEventListener('keypress', (e) => {if (e.key === 'Enter') {submitButton.click();}});});</script></body></html>
